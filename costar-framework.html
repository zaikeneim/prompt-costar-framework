<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CO-STAR — Prompt Engineering Framework</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ─── RESET & TOKENS ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #06060e;
      --surf-0:   #0b0b18;
      --surf-1:   #10101f;
      --surf-2:   #16162c;
      --line:     rgba(255,255,255,0.07);
      --line-hi:  rgba(255,255,255,0.14);
      --txt:      #dde0f2;
      --txt-dim:  rgba(221,224,242,0.45);
      --txt-mute: rgba(221,224,242,0.22);

      /* ── CO-STAR channel colors ── */
      --cc: #00e5ff;  /* Context  */
      --oc: #ff7043;  /* Objective*/
      --sc: #d4a0ff;  /* Style    */
      --tc: #69f0ae;  /* Tone     */
      --ac: #f48fb1;  /* Audience */
      --rc: #82b1ff;  /* Response */

      --radius: 14px;
      --f-display: 'Syne',         sans-serif;
      --f-mono:    'JetBrains Mono', monospace;
      --f-body:    'Outfit',         sans-serif;
      --transition: 0.22s cubic-bezier(.4,0,.2,1);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--txt);
      font-family: var(--f-body);
      font-size: 15px;
      line-height: 1.65;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }

    /* ─── BACKGROUND NOISE ────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.4;
    }

    /* ─── HEADER ──────────────────────────────────────────────────── */
    .hdr {
      position: sticky; top: 0; z-index: 200;
      background: rgba(6,6,14,0.82);
      backdrop-filter: blur(24px) saturate(1.4);
      border-bottom: 1px solid var(--line);
      padding: 0 40px;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between; gap: 20px;
    }

    .logo {
      display: flex; align-items: baseline; gap: 10px;
      text-decoration: none;
    }
    .logo-mark {
      font-family: var(--f-display);
      font-size: 20px; font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .logo-mark .lC { color: var(--cc); }
    .logo-mark .lO { color: var(--oc); }
    .logo-mark .lD { color: var(--txt-dim); }
    .logo-mark .lS { color: var(--sc); }
    .logo-mark .lT { color: var(--tc); }
    .logo-mark .lA { color: var(--ac); }
    .logo-mark .lR { color: var(--rc); }

    .logo-sub {
      font-size: 11px; color: var(--txt-mute);
      text-transform: uppercase; letter-spacing: 0.1em; font-weight: 400;
    }

    /* ─── PROGRESS PIPS ───────────────────────────────────────────── */
    .pips { display: flex; align-items: center; gap: 5px; }
    .pip {
      width: 30px; height: 3px; border-radius: 2px;
      background: var(--line); transition: var(--transition);
    }
    .pip.on { transform: scaleY(1.8); }

    /* ─── API TOGGLE ──────────────────────────────────────────────── */
    .hdr-right { display: flex; align-items: center; gap: 12px; }
    .toggle-wrap {
      display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none;
    }
    .toggle-lbl { font-size: 11px; color: var(--txt-dim); letter-spacing: 0.06em; text-transform: uppercase; }
    .sw {
      width: 42px; height: 22px; border-radius: 11px;
      background: var(--surf-2); border: 1px solid var(--line);
      position: relative; transition: var(--transition); cursor: pointer;
    }
    .sw.on { background: rgba(0,229,255,0.15); border-color: var(--cc); }
    .knob {
      position: absolute; top: 3px; left: 3px;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--txt-dim); transition: var(--transition);
    }
    .sw.on .knob { transform: translateX(20px); background: var(--cc); box-shadow: 0 0 8px var(--cc); }

    /* ─── MAIN LAYOUT ─────────────────────────────────────────────── */
    .main { max-width: 820px; margin: 0 auto; padding: 64px 40px 100px; position: relative; z-index: 1; }

    /* ─── HERO ────────────────────────────────────────────────────── */
    .hero {
      text-align: center; margin-bottom: 72px;
      animation: fadeUp .5s ease both;
    }
    .hero-title {
      font-family: var(--f-display);
      font-size: clamp(52px, 8vw, 88px);
      font-weight: 800; line-height: 1; letter-spacing: -0.04em;
      margin-bottom: 20px;
    }
    .grad {
      background: linear-gradient(135deg, var(--cc) 0%, var(--sc) 40%, var(--ac) 70%, var(--rc) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hero-sub { color: var(--txt-dim); font-size: 15px; max-width: 480px; margin: 0 auto; font-weight: 300; }

    /* ─── COSTAR SECTION CARD ─────────────────────────────────────── */
    .cs-card {
      margin-bottom: 20px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--surf-0);
      overflow: hidden;
      transition: border-color var(--transition), box-shadow var(--transition);
      animation: fadeUp .45s ease both;
    }
    .cs-card.active {
      border-color: transparent;
    }

    .cs-top {
      display: flex; align-items: flex-start; gap: 18px;
      padding: 24px 26px 0;
    }

    .badge {
      width: 54px; height: 54px; flex-shrink: 0;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--f-display);
      font-size: 28px; font-weight: 800; line-height: 1;
      transition: box-shadow var(--transition);
    }

    .cs-info { flex: 1; min-width: 0; }
    .cs-label { font-family: var(--f-display); font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .cs-desc  { font-size: 13px; color: var(--txt-dim); font-weight: 300; line-height: 1.5; }
    .cs-hint  {
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 8px;
      font-size: 11px; font-family: var(--f-mono);
      padding: 3px 9px; border-radius: 5px;
      opacity: 0.75;
    }

    .cs-body { padding: 14px 26px 22px; }

    .cs-ta {
      width: 100%; background: var(--surf-2);
      border: 1px solid var(--line);
      border-radius: 9px; color: var(--txt);
      font-family: var(--f-body); font-size: 14px;
      line-height: 1.65; padding: 13px 16px;
      resize: vertical; min-height: 96px;
      transition: border-color var(--transition), box-shadow var(--transition);
      outline: none;
    }
    .cs-ta::placeholder { color: var(--txt-mute); font-style: italic; }

    .ta-foot { display: flex; justify-content: flex-end; margin-top: 7px; }
    .char-ct { font-size: 11px; font-family: var(--f-mono); color: var(--txt-mute); transition: color var(--transition); }

    /* ─── DIVIDER ─────────────────────────────────────────────────── */
    .divider {
      position: relative; height: 1px;
      background: var(--line); margin: 52px 0 36px;
    }
    .divider span {
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%,-50%);
      background: var(--bg); padding: 0 16px;
      font-size: 10px; color: var(--txt-mute);
      text-transform: uppercase; letter-spacing: 0.12em;
      font-family: var(--f-mono); white-space: nowrap;
    }

    /* ─── PROMPT PANEL ────────────────────────────────────────────── */
    .p-panel {
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--surf-0);
      overflow: hidden;
      animation: fadeUp .45s ease .25s both;
    }
    .p-head {
      padding: 15px 22px;
      border-bottom: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .p-title { font-size: 11px; font-family: var(--f-mono); color: var(--txt-dim); text-transform: uppercase; letter-spacing: 0.09em; }
    .p-count { color: var(--tc); margin-left: 8px; }
    .p-actions { display: flex; align-items: center; gap: 8px; }

    .cp-fb { font-size: 11px; color: var(--tc); font-family: var(--f-mono); opacity: 0; transition: opacity .3s; }
    .cp-fb.vis { opacity: 1; }

    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 13px; border-radius: 7px;
      border: 1px solid var(--line); background: var(--surf-2);
      color: var(--txt-dim); font-size: 11px;
      font-family: var(--f-mono); cursor: pointer;
      transition: var(--transition); text-transform: uppercase; letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .btn:hover:not(:disabled) { border-color: var(--line-hi); color: var(--txt); background: rgba(255,255,255,0.05); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-clr { border-color: rgba(255,82,82,0.25); color: rgba(255,82,82,0.65); }
    .btn-clr:hover:not(:disabled) { border-color: #ff5252; color: #ff5252; background: rgba(255,82,82,0.08); }

    .p-ta {
      width: 100%; background: transparent; border: none;
      color: var(--txt); font-family: var(--f-mono);
      font-size: 13px; line-height: 1.75; padding: 24px 26px;
      resize: vertical; min-height: 260px; outline: none;
    }
    .p-empty {
      padding: 52px 24px; text-align: center;
      color: var(--txt-mute); font-size: 13px; font-family: var(--f-mono);
    }

    /* ─── API PANEL ───────────────────────────────────────────────── */
    .api-panel {
      margin-top: 20px;
      border-radius: var(--radius);
      border: 1px solid rgba(0,229,255,0.14);
      background: rgba(0,229,255,0.025);
      animation: fadeUp .3s ease both;
    }
    .api-cfg {
      padding: 20px 24px;
      border-bottom: 1px solid rgba(0,229,255,0.09);
      display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end;
    }
    .ig { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 180px; }
    .ig-lbl { font-size: 10px; color: var(--txt-dim); text-transform: uppercase; letter-spacing: 0.09em; font-family: var(--f-mono); }
    .ig-in {
      background: var(--surf-2); border: 1px solid var(--line);
      border-radius: 8px; color: var(--txt);
      font-family: var(--f-mono); font-size: 13px;
      padding: 10px 14px; outline: none;
      transition: border-color var(--transition);
    }
    .ig-in:focus { border-color: var(--cc); }
    .ig-in[readonly] { opacity: 0.5; cursor: default; }

    .btn-gen {
      padding: 10px 28px; border-radius: 9px;
      background: linear-gradient(135deg, rgba(0,229,255,.12), rgba(130,177,255,.12));
      border: 1px solid rgba(0,229,255,.35);
      color: var(--cc); font-family: var(--f-display);
      font-size: 14px; font-weight: 700; letter-spacing: 0.03em;
      cursor: pointer; transition: var(--transition); white-space: nowrap;
    }
    .btn-gen:hover:not(:disabled) {
      background: linear-gradient(135deg, rgba(0,229,255,.22), rgba(130,177,255,.22));
      border-color: var(--cc); box-shadow: 0 0 24px rgba(0,229,255,.18);
    }
    .btn-gen:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ─── RESPONSE ────────────────────────────────────────────────── */
    .resp-wrap { padding: 0 26px 26px; }
    .resp-lbl {
      font-size: 10px; font-family: var(--f-mono);
      color: var(--txt-dim); text-transform: uppercase; letter-spacing: 0.09em;
      padding-top: 22px; margin-bottom: 16px;
      border-top: 1px solid rgba(0,229,255,0.09);
    }
    .resp-body { font-size: 14px; line-height: 1.8; color: var(--txt); }
    .resp-body h1, .resp-body h2, .resp-body h3 {
      font-family: var(--f-display); margin: 1.2em 0 .5em; color: var(--txt);
    }
    .resp-body h1 { font-size: 20px; } .resp-body h2 { font-size: 17px; } .resp-body h3 { font-size: 15px; }
    .resp-body p { margin-bottom: .9em; }
    .resp-body code {
      font-family: var(--f-mono); font-size: 12px;
      background: var(--surf-2); border: 1px solid var(--line);
      padding: 1px 6px; border-radius: 4px; color: var(--cc);
    }
    .resp-body pre {
      background: var(--surf-2); border: 1px solid var(--line);
      border-radius: 10px; padding: 16px 18px; overflow-x: auto;
      margin: 1em 0; font-family: var(--f-mono); font-size: 12px; line-height: 1.65;
    }
    .resp-body pre code { background: none; border: none; padding: 0; color: var(--txt); }
    .resp-body ul, .resp-body ol { padding-left: 1.5em; margin-bottom: .9em; }
    .resp-body li { margin-bottom: .3em; }
    .resp-body strong { font-weight: 600; color: var(--txt); }
    .resp-body blockquote {
      border-left: 3px solid var(--cc); padding: 8px 16px; margin: 1em 0;
      color: var(--txt-dim); font-style: italic;
    }
    .resp-body table { border-collapse: collapse; width: 100%; margin: 1em 0; font-size: 13px; }
    .resp-body th, .resp-body td { border: 1px solid var(--line); padding: 8px 12px; text-align: left; }
    .resp-body th { background: var(--surf-2); font-weight: 600; }

    .resp-load {
      display: flex; align-items: center; gap: 10px;
      color: var(--cc); font-size: 13px; font-family: var(--f-mono);
    }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(0,229,255,.2);
      border-top-color: var(--cc);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    .resp-err {
      color: #ff5252; font-size: 13px; font-family: var(--f-mono);
      padding: 12px 16px;
      background: rgba(255,82,82,.07); border: 1px solid rgba(255,82,82,.2);
      border-radius: 8px;
    }

    /* ─── FOOTER ──────────────────────────────────────────────────── */
    .footer {
      text-align: center; padding: 48px 40px;
      font-size: 11px; color: var(--txt-mute); font-family: var(--f-mono);
    }
    .footer a { color: var(--txt-dim); text-decoration: none; }
    .footer a:hover { color: var(--txt); }

    /* ─── ANIMATIONS ──────────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── RESPONSIVE ──────────────────────────────────────────────── */
    @media (max-width: 620px) {
      .hdr { padding: 0 18px; }
      .logo-sub, .pips { display: none; }
      .main { padding: 40px 18px 80px; }
      .cs-top { padding: 18px 18px 0; }
      .cs-body { padding: 12px 18px 18px; }
      .p-head { padding: 12px 18px; }
      .p-ta { padding: 18px; font-size: 12px; }
      .api-cfg { padding: 16px 18px; }
      .resp-wrap { padding: 0 18px 20px; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useCallback, useRef } = React;

/* ── DATA ────────────────────────────────────────────────────────── */
const SECTIONS = [
  {
    key: 'context', letter: 'C', label: 'Context',
    color: '#00e5ff', rgb: '0,229,255',
    desc: 'Set the scene. Provide background details so the LLM understands the full situation.',
    hint: '→ Background · constraints · relevant facts',
    ph: 'e.g. I am a Technical Lead maintaining a Java 21 microservice suite at a fintech company. The services use Spring Boot 3.2, Apache Kafka for event streaming, and run on Kubernetes. We are preparing to migrate three legacy modules from Java 11 to Java 21...',
  },
  {
    key: 'objective', letter: 'O', label: 'Objective',
    color: '#ff7043', rgb: '255,112,67',
    desc: 'What do you want to achieve? One precise, focused goal per prompt.',
    hint: '→ The exact task · one clear deliverable',
    ph: 'e.g. Write a step-by-step migration guide covering: removal of deprecated APIs, adoption of Records and Sealed classes, structured concurrency with Project Loom, and the impact on Spring Boot configuration...',
  },
  {
    key: 'style', letter: 'S', label: 'Style',
    color: '#d4a0ff', rgb: '212,160,255',
    desc: 'Define the writing style — structure, conventions, and voice.',
    hint: '→ Writing structure · voice · conventions',
    ph: 'e.g. Technical documentation style similar to the official Spring Framework reference. Active voice throughout. Numbered lists for sequential steps, code blocks with language markers, and ⚠️ callout boxes for breaking changes...',
  },
  {
    key: 'tone', letter: 'T', label: 'Tone',
    color: '#69f0ae', rgb: '105,240,174',
    desc: 'Define the emotional register and attitude of the response.',
    hint: '→ Formal/informal · authoritative · urgent/calm',
    ph: 'e.g. Professional and authoritative. Assume reader competence — no hand-holding. Be direct and concise. Flag genuine gotchas without manufacturing urgency. Confidence without condescension...',
  },
  {
    key: 'audience', letter: 'A', label: 'Audience',
    color: '#f48fb1', rgb: '244,143,177',
    desc: 'Identify your target reader. Tailor vocabulary and assumed knowledge precisely.',
    hint: '→ Role · experience level · domain expertise',
    ph: 'e.g. Senior Java developers (5+ years experience) who are fluent with Spring Boot and standard Java concurrency. They understand JVM internals but have not worked with Project Loom, Records, or sealed interfaces in production...',
  },
  {
    key: 'response', letter: 'R', label: 'Response',
    color: '#82b1ff', rgb: '130,177,255',
    desc: 'Define the output format, structure, length, and hard constraints.',
    hint: '→ Format · length · structure · constraints',
    ph: 'e.g. Markdown document. Open with a TL;DR (3 sentences max). Sections: Background → Migration Steps → Code Examples → Breaking Changes → Performance Notes. Close with a Java 11→21 compatibility matrix table. Hard limit: 1500 words...',
  },
];

const MODEL = 'claude-sonnet-4-20250514';

function assemblePrompt(fields) {
  const parts = SECTIONS
    .filter(s => fields[s.key]?.trim())
    .map(s => `## ${s.letter} — ${s.label}\n${fields[s.key].trim()}`);
  return parts.join('\n\n---\n\n');
}

/* ── SECTION CARD ────────────────────────────────────────────────── */
function SectionCard({ sec, value, onChange, idx }) {
  const [active, setActive] = useState(false);
  const hasVal = value.trim().length > 0;

  const borderStyle = active
    ? { borderColor: 'transparent', boxShadow: `0 0 0 1.5px ${sec.color}, 0 12px 48px rgba(0,0,0,.5)` }
    : hasVal
    ? { borderColor: `rgba(${sec.rgb},.25)` }
    : {};

  return (
    <div
      className={`cs-card${active ? ' active' : ''}`}
      style={{ ...borderStyle, animationDelay: `${idx * 0.07}s` }}
    >
      <div className="cs-top">
        <div
          className="badge"
          style={{
            background: `rgba(${sec.rgb},.1)`,
            color: sec.color,
            boxShadow: active ? `0 0 20px rgba(${sec.rgb},.35)` : 'none',
          }}
        >
          {sec.letter}
        </div>
        <div className="cs-info">
          <div className="cs-label" style={{ color: sec.color }}>{sec.label}</div>
          <div className="cs-desc">{sec.desc}</div>
          <span
            className="cs-hint"
            style={{ background: `rgba(${sec.rgb},.08)`, color: sec.color, border: `1px solid rgba(${sec.rgb},.2)` }}
          >
            {sec.hint}
          </span>
        </div>
      </div>

      <div className="cs-body">
        <textarea
          className="cs-ta"
          placeholder={sec.ph}
          value={value}
          rows={4}
          onFocus={() => setActive(true)}
          onBlur={() => setActive(false)}
          onChange={e => onChange(sec.key, e.target.value)}
          style={{
            borderColor: active ? sec.color : hasVal ? `rgba(${sec.rgb},.3)` : undefined,
            boxShadow: active ? `0 0 0 2px rgba(${sec.rgb},.1)` : 'none',
          }}
        />
        <div className="ta-foot">
          <span
            className="char-ct"
            style={{ color: hasVal ? sec.color : undefined, opacity: hasVal ? 0.65 : undefined }}
          >
            {hasVal ? `${value.trim().length} chars` : 'empty'}
          </span>
        </div>
      </div>
    </div>
  );
}

/* ── APP ─────────────────────────────────────────────────────────── */
function App() {
  const [fields, setFields] = useState(
    Object.fromEntries(SECTIONS.map(s => [s.key, '']))
  );
  const [apiMode, setApiMode] = useState(false);
  const [apiKey, setApiKey] = useState('');
  const [loading, setLoading] = useState(false);
  const [response, setResponse] = useState(null);
  const [error, setError] = useState(null);
  const [copied, setCopied] = useState(false);

  const prompt = assemblePrompt(fields);
  const filled = SECTIONS.filter(s => fields[s.key]?.trim()).length;

  const handleChange = useCallback((key, val) => {
    setFields(f => ({ ...f, [key]: val }));
  }, []);

  const handleCopy = () => {
    if (!prompt) return;
    navigator.clipboard.writeText(prompt).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2200);
    });
  };

  const handleClear = () => {
    setFields(Object.fromEntries(SECTIONS.map(s => [s.key, ''])));
    setResponse(null);
    setError(null);
  };

  const handleGenerate = async () => {
    if (!prompt || !apiKey.trim()) return;
    setLoading(true); setResponse(null); setError(null);
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey.trim(),
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: MODEL,
          max_tokens: 2048,
          messages: [{ role: 'user', content: prompt }],
        }),
      });
      if (!res.ok) {
        const e = await res.json().catch(() => ({}));
        throw new Error(e?.error?.message || `HTTP ${res.status} — ${res.statusText}`);
      }
      const data = await res.json();
      const text = (data.content || []).map(b => b.text || '').join('');
      setResponse(text);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  const renderedMarkdown = response
    ? { __html: marked.parse(response) }
    : null;

  return (
    <>
      {/* ── HEADER ── */}
      <header className="hdr">
        <div className="logo">
          <div className="logo-mark">
            <span className="lC">C</span><span className="lO">O</span>
            <span className="lD">-</span>
            <span className="lS">S</span><span className="lT">T</span>
            <span className="lA">A</span><span className="lR">R</span>
          </div>
          <span className="logo-sub">Prompt Framework</span>
        </div>

        <div className="pips">
          {SECTIONS.map(s => (
            <div
              key={s.key}
              className={`pip${fields[s.key]?.trim() ? ' on' : ''}`}
              style={{ background: fields[s.key]?.trim() ? s.color : undefined }}
              title={s.label}
            />
          ))}
        </div>

        <div className="hdr-right">
          <div className="toggle-wrap" onClick={() => setApiMode(m => !m)}>
            <span className="toggle-lbl">{apiMode ? 'API On' : 'Preview'}</span>
            <div className={`sw${apiMode ? ' on' : ''}`}>
              <div className="knob" />
            </div>
          </div>
        </div>
      </header>

      {/* ── MAIN ── */}
      <main className="main">

        {/* HERO */}
        <div className="hero">
          <h1 className="hero-title"><span className="grad">CO-STAR</span></h1>
          <p className="hero-sub">
            A structured framework for high-precision prompt engineering.
            Fill each section to compose a complete, unambiguous prompt — then preview or send to Claude directly.
          </p>
        </div>

        {/* SECTIONS */}
        {SECTIONS.map((sec, i) => (
          <SectionCard
            key={sec.key}
            sec={sec}
            value={fields[sec.key]}
            onChange={handleChange}
            idx={i}
          />
        ))}

        {/* DIVIDER */}
        <div className="divider"><span>Assembled Prompt</span></div>

        {/* PROMPT PANEL */}
        <div className="p-panel">
          <div className="p-head">
            <span className="p-title">
              output
              <span className="p-count"> [{filled}/{SECTIONS.length}]</span>
            </span>
            <div className="p-actions">
              <span className={`cp-fb${copied ? ' vis' : ''}`}>✓ Copied</span>
              <button className="btn" onClick={handleCopy} disabled={!prompt}>
                {copied ? 'Copied' : 'Copy'}
              </button>
              <button className="btn btn-clr" onClick={handleClear}>
                Clear All
              </button>
            </div>
          </div>

          {prompt
            ? <textarea className="p-ta" value={prompt} readOnly rows={14} />
            : <div className="p-empty">// Fill sections above — your assembled prompt will appear here</div>
          }
        </div>

        {/* API PANEL */}
        {apiMode && (
          <div className="api-panel">
            <div className="api-cfg">
              <div className="ig" style={{ flex: 2 }}>
                <label className="ig-lbl">Anthropic API Key</label>
                <input
                  type="password" className="ig-in"
                  placeholder="sk-ant-api03-..."
                  value={apiKey}
                  onChange={e => setApiKey(e.target.value)}
                />
              </div>
              <div className="ig" style={{ flex: 1, minWidth: 160 }}>
                <label className="ig-lbl">Model</label>
                <input type="text" className="ig-in" value={MODEL} readOnly />
              </div>
              <button
                className="btn-gen"
                onClick={handleGenerate}
                disabled={!prompt || !apiKey.trim() || loading}
              >
                {loading ? 'Generating…' : 'Generate →'}
              </button>
            </div>

            {(loading || response || error) && (
              <div className="resp-wrap">
                <div className="resp-lbl">Response — {MODEL}</div>
                {loading && (
                  <div className="resp-load">
                    <div className="spinner" />
                    Waiting for Claude…
                  </div>
                )}
                {error && <div className="resp-err">Error: {error}</div>}
                {renderedMarkdown && (
                  <div
                    className="resp-body"
                    dangerouslySetInnerHTML={renderedMarkdown}
                  />
                )}
              </div>
            )}
          </div>
        )}

      </main>

      <footer className="footer">
        CO-STAR framework by{' '}
        <a href="https://towardsdatascience.com/how-i-won-singapores-gpt-4-prompt-engineering-competition-34c195a93d41" target="_blank" rel="noopener">Sheila Teo</a>
        {' · '}
        <a href="https://medium.com/the-generator/the-perfect-prompt-prompt-engineering-cheat-sheet-d0b9c62a2bba" target="_blank" rel="noopener">Cheat Sheet — Maximilian Vogel</a>
        {' · '}
        Built with React 18 · No build step required
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
